<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StoryBond – Create Account</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>

  <!-- Linking CSS file -->
  <link rel="stylesheet" href="login-style.css" />
</head>
<body>

  <!-- Animated background blobs -->
  <div class="bg-canvas" aria-hidden="true">
    <div class="bubble bubble--1"></div>
    <div class="bubble bubble--2"></div>
    <div class="bubble bubble--3"></div>
    <div class="bubble bubble--4"></div>
    <div class="bubble bubble--5"></div>
  </div>

  <!-- Floating emoji decorations -->
  <span class="emoji-deco" aria-hidden="true">🌟</span>
  <span class="emoji-deco" aria-hidden="true">🎈</span>
  <span class="emoji-deco" aria-hidden="true">🦄</span>
  <span class="emoji-deco" aria-hidden="true">🍭</span>
  <span class="emoji-deco" aria-hidden="true">🎀</span>
  <span class="emoji-deco" aria-hidden="true">🌈</span>

  <!-- Sign Up card -->
  <div class="card" role="main">

    <!-- Header -->
    <div class="header">
      <span class="mascot" aria-hidden="true">🦊</span>
      <h1><span class="brand-name">StoryBond</span></h1>
      <p class="header__subtitle">Create your parent account 🎨</p>
    </div>

    <!-- Success message (shown by script on successful signup) -->
    <div class="success-banner" id="successBanner" role="alert" aria-live="polite">
      🎉 Account created! Redirecting to login... 🎊
    </div>

    <!-- Sign Up form -->
    <form class="form" id="signupForm" novalidate>

      <!-- Email field -->
      <div class="field">
        <label class="field__label" for="email">
          <span>📧</span> Email Address
        </label>
        <div class="field__input-wrap">
          <svg class="field__svg-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input class="field__input" type="email" id="email"
                 placeholder="parent@example.com" autocomplete="email"
                 aria-describedby="emailError" />
        </div>
        <span class="field__error" id="emailError" role="alert"></span>
      </div>

      <!-- Username field -->
      <div class="field">
        <label class="field__label" for="username">
          <span>👤</span> Username
        </label>
        <div class="field__input-wrap">
          <svg class="field__svg-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <input class="field__input" type="text" id="username"
                 placeholder="coolparent123" autocomplete="username"
                 aria-describedby="usernameError" />
        </div>
        <span class="field__error" id="usernameError" role="alert"></span>
      </div>

      <!-- Password field -->
      <div class="field">
        <label class="field__label" for="password">
          <span>🔐</span> Password
        </label>
        <div class="field__input-wrap">
          <svg class="field__svg-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <input class="field__input" type="password" id="password"
                 placeholder="Create a secure password" autocomplete="new-password"
                 aria-describedby="passwordError" />
        </div>
        <span class="field__error" id="passwordError" role="alert"></span>
      </div>

      <!-- Confirm Password field -->
      <div class="field">
        <label class="field__label" for="confirmPassword">
          <span>🔑</span> Retype Password
        </label>
        <div class="field__input-wrap">
          <svg class="field__svg-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <input class="field__input" type="password" id="confirmPassword"
                 placeholder="Confirm your password" autocomplete="new-password"
                 aria-describedby="confirmPasswordError" />
        </div>
        <span class="field__error" id="confirmPasswordError" role="alert"></span>
      </div>

      <!-- Terms & Conditions -->
      <div class="terms-row">
        <label class="remember">
          <input type="checkbox" id="terms" /> 
          I agree to the <a href="#" class="terms-link">Terms & Conditions</a>
        </label>
      </div>

      <!-- Submit button -->
      <button class="btn-login" type="button" id="signupBtn">
        <span class="btn-login__text">🎉 Create Account</span>
        <span class="btn-login__spinner" aria-hidden="true"></span>
      </button>

    </form>

    <!-- Footer -->
    <div class="stars-row" aria-hidden="true">⭐ ⭐ ⭐</div>
    <div class="footer">
      Already have an account? <a href="login.html">Back to Login</a>
    </div>

  </div>

  <!-- JavaScript -->
  <script src="signup-script.js"></script>

</body>
</html>
