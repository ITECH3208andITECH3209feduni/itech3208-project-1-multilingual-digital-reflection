<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryBond - Weekly Recap</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Rainbow Magic Bar -->
    <div class="rainbow-top"></div>
    
    <div class="app-wrapper">
        <!-- Left Sidebar -->
        <aside class="sidebar">
            <!-- Brand -->
            <div class="brand">
                <div class="logo">🦊</div>
                <h1 class="brand-name">StoryBond</h1>
                <p class="brand-tagline">Learning Journey Tracker</p>
            </div>

            <!-- Navigation -->
            <nav class="nav">
                <p class="nav-heading">NAVIGATION</p>
                <a href="index.html" class="nav-link">
                    <span class="nav-emoji">🏠</span>
                    <span>Home</span>
                </a>
                <a href="journal.html" class="nav-link">
                    <span class="nav-emoji">📖</span>
                    <span>Journal</span>
                </a>
                <a href="upload.html" class="nav-link">
                    <span class="nav-emoji">📤</span>
                    <span>Upload</span>
                </a>
                <a href="weekly.html" class="nav-link active">
                    <span class="nav-emoji">📊</span>
                    <span>Weekly recap</span>
                </a>
            </nav>

            <!-- Children -->
            <div class="children">
                <p class="nav-heading">CHILDREN</p>
                <button class="add-child-btn">
                    <span class="plus">+</span>
                    <span>Add child</span>
                </button>
            </div>

            <!-- User Profile -->
            <div class="user-card">
                <div class="user-avatar">PA</div>
                <div class="user-details">
                    <p class="user-name">Parent Account</p>
                    <p class="user-role">Parent 💝</p>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main">
            <header class="header">
                <div>
                    <h1 class="greeting">Weekly Recap 📊</h1>
                    <p class="date">Coming soon...</p>
                </div>
                <div class="lang-switcher">
                    <button class="lang-btn active">EN</button>
                    <button class="lang-btn">TR</button>
                </div>
            </header>

            <div class="empty-uploads" style="margin-top: 100px;">
                <div class="empty-icon">📊</div>
                <h3 class="empty-title">Weekly Recap Page</h3>
                <p class="empty-text">This page is under development. Here you'll see detailed weekly progress and statistics.</p>
            </div>
        </main>
    </div>
</body>
</html>
